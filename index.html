<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Precision Pitch Match</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --panel: #141414;
            --text: #ffffff;
            --text-dim: #666;
            --accent: #00ff88;
        }

        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            background-color: var(--bg); color: var(--text);
            font-family: 'Inter', sans-serif; overflow: hidden;
        }

        #home-screen {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: var(--bg); z-index: 2000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }

        .title { font-size: 3.5rem; font-weight: 900; margin-bottom: 40px; text-align: center; }

        #game-wrapper { display: flex; height: 100vh; width: 100vw; visibility: hidden; }

        #sidebar {
            width: 200px; background: var(--panel);
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; border-right: 1px solid #222;
        }

        input[type=range].modern-vertical {
            -webkit-appearance: none;
            width: 500px; height: 30px;
            background: #222; border-radius: 15px;
            transform: rotate(270deg); cursor: pointer;
            outline: none;
        }

        input[type=range].modern-vertical::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 45px; height: 45px;
            background: var(--accent); border: 5px solid black;
            border-radius: 50%; box-shadow: 0 0 20px var(--accent);
        }

        #workspace { flex: 1; position: relative; display: flex; background: #000; }
        
        .wave-panel { flex: 1; display: flex; align-items: center; justify-content: center; border-right: 1px solid #111; }
        #target-panel { background: #050505; transition: background 0.3s; }
        #user-panel { background: #080808; }

        #countdown-container {
            position: absolute; top: 30px; right: 40px; text-align: right;
        }

        #countdown { font-size: 5rem; font-weight: 900; font-variant-numeric: tabular-nums; }

        #game-ui { position: absolute; left: 40px; top: 40px; z-index: 60; pointer-events: none; }
        #game-ui * { pointer-events: auto; }

        .round-info { font-size: 0.75rem; font-weight: 800; color: var(--text-dim); margin-bottom: 20px; }

        .btn-action {
            background: white; color: black; border: none; padding: 18px 40px;
            font-weight: 800; border-radius: 4px; cursor: pointer; text-transform: uppercase;
            transition: transform 0.1s;
        }

        .btn-action:active { transform: scale(0.95); }
        .btn-action:disabled { opacity: 0; pointer-events: none; }

        #score-popup { font-size: 5rem; font-weight: 900; margin-top: 20px; color: var(--accent); }

        #results-screen {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: #050505; z-index: 1000; display: none;
            flex-direction: column; justify-content: center; align-items: center;
        }
    </style>
</head>
<body>

<div id="home-screen">
    <h1 class="title">PITCH<br>PERFECT</h1>
    <button class="btn-action" onclick="initAudio()">Start Mission</button>
</div>

<div id="game-wrapper">
    <div id="sidebar">
        <div style="font-size: 0.7rem; color: var(--text-dim); margin-bottom: 150px; letter-spacing: 2px;">FREQUENCY</div>
        <input type="range" id="freq-slider" class="modern-vertical" min="200" max="1000" step="0.1" value="440">
        <div style="font-size: 1.2rem; font-weight: 900; margin-top: 150px; font-variant-numeric: tabular-nums;" id="val-f">440Hz</div>
    </div>

    <div id="workspace">
        <div id="target-panel" class="wave-panel">
            <div id="target-label" style="color: #333; font-weight: 900; letter-spacing: 2px;">TARGET TONE</div>
        </div>
        <div id="user-half" class="wave-panel" style="flex:1; background: #080808;">
            <div id="user-label" style="color: #333; font-weight: 900; letter-spacing: 2px;">YOUR TONE</div>
        </div>

        <div id="countdown-container">
            <div id="countdown">3.000</div>
        </div>

        <div id="game-ui">
            <div class="round-info">ROUND <span id="round-num">1</span> / 5 &nbsp; | &nbsp; TOTAL <span id="total-score">0.0</span></div>
            <button id="main-btn" class="btn-action" onclick="submit()">Submit Match</button>
            <div id="score-popup"></div>
        </div>
    </div>

    <div id="results-screen">
        <p style="color: var(--text-dim); letter-spacing: 4px;">MISSION COMPLETE</p>
        <h1 id="final-total" style="font-size: 8rem; margin: 10px 0;">0.0</h1>
        <div style="display: flex; gap: 20px;">
            <button class="btn-action" onclick="location.reload()">Home</button>
        </div>
    </div>
</div>

<script>
    let audioCtx, targetOsc, userOsc, targetGain, userGain;
    let round = 1;
    let totalScore = 0;
    let targetFreq = 0;
    let isRoundActive = false;

    function initAudio() {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        targetOsc = audioCtx.createOscillator();
        targetGain = audioCtx.createGain();
        targetOsc.connect(targetGain);
        targetGain.connect(audioCtx.destination);
        targetGain.gain.value = 0;
        targetOsc.start();

        userOsc = audioCtx.createOscillator();
        userGain = audioCtx.createGain();
        userOsc.connect(userGain);
        userGain.connect(audioCtx.destination);
        userGain.gain.value = 0;
        userOsc.start();

        document.getElementById('home-screen').style.display = 'none';
        document.getElementById('game-wrapper').style.visibility = 'visible';
        
        // Continuous update listener
        document.getElementById('freq-slider').addEventListener('input', updateLivePitch);
        
        startRound();
    }

    function startRound() {
        if (round > 5) return;
        isRoundActive = true;
        targetFreq = Math.floor(Math.random() * 600) + 250; 
        targetOsc.frequency.setValueAtTime(targetFreq, audioCtx.currentTime);
        
        // Reset UI
        document.getElementById('target-panel').style.background = "#1a1a1a";
        document.getElementById('target-label').innerText = "TARGET TONE";
        document.getElementById('score-popup').innerText = "";
        document.getElementById('main-btn').innerText = "Submit Match";
        document.getElementById('main-btn').disabled = true;

        // Silence User during memorization
        userGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.05);

        // Play Target
        targetGain.gain.setTargetAtTime(0.25, audioCtx.currentTime, 0.05);

        let startTime = Date.now();
        const timer = setInterval(() => {
            let remaining = Math.max(0, 3000 - (Date.now() - startTime));
            document.getElementById('countdown').innerText = (remaining / 1000).toFixed(3);
            
            if (remaining <= 0) {
                clearInterval(timer);
                targetGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.05);
                document.getElementById('target-panel').style.background = "#050505";
                
                // Switch to User Control
                document.getElementById('main-btn').disabled = false;
                updateLivePitch(); 
            }
        }, 10);
    }

    function updateLivePitch() {
        if (!isRoundActive) return;
        const f = document.getElementById('freq-slider').value;
        document.getElementById('val-f').innerText = Math.round(f) + "Hz";
        
        userOsc.frequency.setTargetAtTime(f, audioCtx.currentTime, 0.03);
        // User tone is always on during the matching phase
        if (document.getElementById('main-btn').disabled === false) {
            userGain.gain.setTargetAtTime(0.2, audioCtx.currentTime, 0.05);
        }
    }

    function submit() {
        isRoundActive = false;
        document.getElementById('main-btn').disabled = true;

        // Play both together for the comparison
        userGain.gain.setTargetAtTime(0.15, audioCtx.currentTime, 0.05);
        targetGain.gain.setTargetAtTime(0.15, audioCtx.currentTime, 0.05);
        
        const userFreq = document.getElementById('freq-slider').value;
        const dist = Math.abs(Math.log2(userFreq / targetFreq));
        
        // Score 1.0 - 10.0
        let roundScore = Math.max(1, 10 - (dist * 25)); 
        roundScore = Math.round(roundScore * 10) / 10;

        totalScore += roundScore;
        document.getElementById('score-popup').innerText = roundScore.toFixed(1);
        document.getElementById('target-panel').style.background = "var(--accent)";
        document.getElementById('target-label').innerText = `TARGET: ${Math.round(targetFreq)}Hz`;

        const isLastRound = round >= 5;
        setTimeout(() => {
            // Fade out audio
            targetGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.1);
            userGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.1);
            
            const btn = document.getElementById('main-btn');
            btn.disabled = false;
            btn.innerText = isLastRound ? "Show Results" : "Continue";
            btn.onclick = isLastRound ? showResults : nextRound;
        }, 2000);
    }

    function nextRound() {
        round++;
        document.getElementById('round-num').innerText = round;
        document.getElementById('total-score').innerText = totalScore.toFixed(1);
        document.getElementById('main-btn').onclick = submit;
        startRound();
    }

    function showResults() {
        document.getElementById('results-screen').style.display = 'flex';
        document.getElementById('final-total').innerText = totalScore.toFixed(1);
    }
</script>

</body>
</html>
